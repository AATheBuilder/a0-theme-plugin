<script type="module">
  const initThemeStore = () => {
    if (!Alpine.store('themePlugin')) {
      Alpine.store('themePlugin', {
        currentTheme: localStorage.getItem('a0-theme') || 'default',
        setTheme(theme) {
          this.currentTheme = theme;
          localStorage.setItem('a0-theme', theme);
          this.applyTheme();
        },
        applyTheme() {
          document.body.setAttribute('data-theme', this.currentTheme);
        }
      });
      Alpine.store('themePlugin').applyTheme();
    }
  };

  if (window.Alpine) {
    initThemeStore();
  } else {
    document.addEventListener('alpine:init', initThemeStore);
  }
  
  if (localStorage.getItem('a0-theme')) {
      document.body.setAttribute('data-theme', localStorage.getItem('a0-theme'));
  }
</script>

    <select 
      @change="$store.themePlugin.setTheme($event.target.value)" 
      style="width: 100%; padding: 8px; border-radius: 6px; background: rgba(0,0,0,0.2); color: inherit; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;"
    >
      <option value="default" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'default'" style="color: #000;">Default</option>
      <option value="hacker" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'hacker'" style="color: #000;">Hacker</option>
      <option value="flower" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'flower'" style="color: #000;">Flower</option>
      <option value="cyberpunk" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'cyberpunk'" style="color: #000;">Cyberpunk</option>
      <option value="nord" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'nord'" style="color: #000;">Nord (Arctic)</option>
      <option value="amber" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'amber'" style="color: #000;">Retro Amber</option>
      <option value="dracula" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'dracula'" style="color: #000;">Dracula</option>
      <option value="oled" :selected="$store.themePlugin && $store.themePlugin.currentTheme === 'oled'" style="color: #000;">Pure OLED</option>
